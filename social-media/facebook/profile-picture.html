<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&display=swap');

body {
    width: 512px;
    height: 512px;
    overflow: hidden;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

/* Subtle ring */
.ring {
    position: absolute;
    width: 460px; height: 460px;
    border: 2px solid rgba(230, 57, 70, 0.15);
    border-radius: 50%;
}
.ring2 {
    position: absolute;
    width: 500px; height: 500px;
    border: 1px solid rgba(230, 57, 70, 0.06);
    border-radius: 50%;
}

.logo {
    position: relative;
    z-index: 1;
    text-align: center;
}

.red {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10rem;
    font-weight: 900;
    color: #E63946;
    letter-spacing: 8px;
    text-transform: uppercase;
    line-height: 1;
}
.dot {
    color: #fff;
}
.sub {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 12px;
    margin-top: 4px;
}

/* Bottom accent line */
.accent-line {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, #E63946, #ff6b8a);
    border-radius: 2px;
}
</style>
</head>
<body>
    <div class="ring"></div>
    <div class="ring2"></div>
    <div class="logo">
        <div class="red">RED<span class="dot">.</span></div>
        <div class="sub">Web Studio</div>
    </div>
    <div class="accent-line"></div>
</body>
</html>
