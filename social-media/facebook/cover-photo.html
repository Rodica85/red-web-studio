<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

body {
    width: 820px;
    height: 312px;
    overflow: hidden;
    background: #0a0a0a;
    font-family: 'DM Sans', sans-serif;
    position: relative;
}

/* Background glow — smart/tech look */
body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
        radial-gradient(circle at 20% 50%, rgba(230, 57, 70, 0.18) 0%, transparent 50%),
        radial-gradient(circle at 80% 30%, rgba(79, 172, 254, 0.12) 0%, transparent 45%),
        radial-gradient(circle at 60% 80%, rgba(230, 57, 70, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 90% 70%, rgba(79, 172, 254, 0.06) 0%, transparent 30%);
}

/* Decorative circle — bottom right, won't overlap text */
.circle1 {
    position: absolute;
    width: 350px; height: 350px;
    border: 1px solid rgba(230, 57, 70, 0.1);
    border-radius: 50%;
    bottom: -120px; right: -40px;
}

/* Layout: two columns */
.wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    height: 100%;
}

/* Left column — main content */
.left {
    flex: 1;
    padding: 40px 0 40px 55px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.logo-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 16px;
}
.logo-red {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.8rem;
    font-weight: 900;
    color: #E63946;
    letter-spacing: 3px;
    text-transform: uppercase;
}
.logo-dot {
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.8rem;
    font-weight: 900;
}
.logo-sub {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    color: #fff;
    letter-spacing: 1px;
}

h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2.4rem;
    font-weight: 800;
    color: #fff;
    text-transform: uppercase;
    line-height: 1.08;
    letter-spacing: 1px;
    max-width: 420px;
}
h1 .accent {
    background: linear-gradient(135deg, #E63946 0%, #ff6b8a 40%, #4facfe 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.tagline {
    margin-top: 14px;
    font-size: 0.9rem;
    color: #888;
    letter-spacing: 0.5px;
}
.tagline strong { color: #E63946; font-weight: 700; }

/* Right column — features */
.right {
    width: 260px;
    padding: 36px 40px 36px 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
}

.feat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.6rem;
    color: #aaa;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 7px 14px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.02);
    display: flex;
    align-items: center;
    gap: 10px;
}
.feat .dot {
    width: 5px; height: 5px;
    background: #E63946;
    border-radius: 50%;
    flex-shrink: 0;
}

/* Price badge */
.price-badge {
    margin-top: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 8px 14px;
    border: 1px solid rgba(230, 57, 70, 0.4);
    background: rgba(230, 57, 70, 0.1);
    text-align: center;
}
.price-badge span { color: #E63946; font-size: 1.1rem; }

/* Bottom accent bar */
.bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #E63946, #ff6b8a, #4facfe);
}

/* Dot decoration — top right */
.dots {
    position: absolute;
    top: 20px; right: 30px;
    display: grid;
    grid-template-columns: repeat(4, 8px);
    gap: 10px;
}
.dots span {
    width: 2px; height: 2px;
    background: rgba(230, 57, 70, 0.25);
    border-radius: 50%;
}
</style>
</head>
<body>
    <div class="circle1"></div>
    <div class="dots">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
    </div>

    <div class="wrapper">
        <div class="left">
            <div class="logo-row">
                <span class="logo-red">RED</span><span class="logo-dot">.</span>
                <span class="logo-sub">Web Studio</span>
            </div>
            <h1>Professional Websites<br>For <span class="accent">Small Businesses</span></h1>
            <p class="tagline">Custom Design &bull; AI Chatbot &bull; SEO &bull; United Kingdom</p>
        </div>

        <div class="right">
            <div class="feat"><span class="dot"></span>Web Design</div>
            <div class="feat"><span class="dot"></span>AI Chatbot 24/7</div>
            <div class="feat"><span class="dot"></span>SEO Included</div>
            <div class="feat"><span class="dot"></span>7-Day Delivery</div>
        </div>
    </div>

    <div class="bottom-bar"></div>
</body>
</html>
