<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

body {
    width: 820px;
    height: 312px;
    overflow: hidden;
    background: #000;
    font-family: 'DM Sans', sans-serif;
    position: relative;
}

/* Subtle grid pattern */
body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
        radial-gradient(circle at 20% 50%, rgba(230, 57, 70, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 30%, rgba(79, 172, 254, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 60% 80%, rgba(230, 57, 70, 0.06) 0%, transparent 40%);
}

/* Decorative circles */
.circle1 {
    position: absolute;
    width: 400px; height: 400px;
    border: 1px solid rgba(230, 57, 70, 0.12);
    border-radius: 50%;
    top: -100px; right: -50px;
}
.circle2 {
    position: absolute;
    width: 300px; height: 300px;
    border: 1px solid rgba(255,255,255, 0.04);
    border-radius: 50%;
    bottom: -80px; left: 100px;
}

/* Dot grid */
.dots {
    position: absolute;
    top: 30px; right: 40px;
    display: grid;
    grid-template-columns: repeat(5, 8px);
    gap: 12px;
}
.dots span {
    width: 3px; height: 3px;
    background: rgba(230, 57, 70, 0.3);
    border-radius: 50%;
}

.content {
    position: relative;
    z-index: 1;
    padding: 50px 60px;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.logo-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 20px;
}
.logo-red {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2.2rem;
    font-weight: 900;
    color: #E63946;
    letter-spacing: 3px;
    text-transform: uppercase;
}
.logo-dot { color: #fff; font-family: 'Barlow Condensed', sans-serif; font-size: 2.2rem; font-weight: 900; }
.logo-sub {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: #fff;
    letter-spacing: 1px;
}

h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2.6rem;
    font-weight: 800;
    color: #fff;
    text-transform: uppercase;
    line-height: 1.05;
    letter-spacing: 1px;
}
h1 .accent {
    background: linear-gradient(135deg, #E63946 0%, #ff6b8a 40%, #4facfe 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.tagline {
    margin-top: 14px;
    font-size: 0.95rem;
    color: #888;
    letter-spacing: 0.5px;
}
.tagline strong { color: #E63946; }

.bottom-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #E63946, #ff6b8a, #4facfe);
}

/* Right side feature tags */
.features {
    position: absolute;
    right: 60px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.feat {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem;
    color: #888;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.02);
}
.feat .dot {
    display: inline-block;
    width: 5px; height: 5px;
    background: #E63946;
    border-radius: 50%;
    margin-right: 8px;
}
</style>
</head>
<body>
    <div class="circle1"></div>
    <div class="circle2"></div>
    <div class="dots">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="content">
        <div class="logo-row">
            <span class="logo-red">RED</span><span class="logo-dot">.</span>
            <span class="logo-sub">Web Studio</span>
        </div>
        <h1>Professional Websites<br>For <span class="accent">Small Businesses</span></h1>
        <p class="tagline">Web Design &bull; AI Chatbot &bull; SEO &bull; From <strong>&pound;399</strong></p>
    </div>

    <div class="features">
        <div class="feat"><span class="dot"></span>Web Design</div>
        <div class="feat"><span class="dot"></span>AI Chatbot</div>
        <div class="feat"><span class="dot"></span>SEO Included</div>
        <div class="feat"><span class="dot"></span>7-Day Delivery</div>
    </div>

    <div class="bottom-bar"></div>
</body>
</html>
