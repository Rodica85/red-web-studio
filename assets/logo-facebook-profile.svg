<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E63946;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C1121F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0F1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1A2E;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="800" fill="url(#bgGrad)" rx="80"/>
  <!-- Subtle glow -->
  <circle cx="400" cy="360" r="200" fill="rgba(230, 57, 70, 0.06)"/>
  <!-- RED handwritten -->
  <text x="400" y="430" font-family="'Caveat', 'Brush Script MT', cursive" font-weight="700" font-size="200" fill="url(#redGrad)" text-anchor="middle" font-style="italic">RED</text>
  <!-- Web Studio -->
  <text x="400" y="510" font-family="'DM Sans', 'Helvetica Neue', Arial, sans-serif" font-weight="600" font-size="36" fill="#ffffff" text-anchor="middle" letter-spacing="6">Web Studio</text>
  <!-- Tagline -->
  <text x="400" y="570" font-family="monospace" font-size="18" fill="#888888" text-anchor="middle" letter-spacing="4">RESULTS. EFFICIENCY. DESIGN.</text>
</svg>