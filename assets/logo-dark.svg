<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E63946;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C1121F;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="400" height="120" fill="#1A1A2E" rx="8"/>
  <!-- RED text -->
  <text x="80" y="82" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-weight="900" font-size="72" fill="url(#redGrad)" letter-spacing="8">RED</text>
  <!-- Tagline -->
  <text x="82" y="105" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="13" fill="#888888" letter-spacing="5">WEB DESIGN STUDIO</text>
  <!-- Accent line -->
  <rect x="80" y="30" width="50" height="4" rx="2" fill="#E63946"/>
</svg>